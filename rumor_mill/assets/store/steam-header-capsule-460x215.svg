<svg xmlns="http://www.w3.org/2000/svg" width="460" height="215" viewBox="0 0 460 215">
  <defs>
    <!-- Aged parchment background texture -->
    <filter id="parchmentFilter" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65 0.55" numOctaves="4" seed="12" result="noise"/>
      <feColorMatrix type="matrix"
        values="0.4 0.3 0.1 0 0.85
                0.3 0.25 0.1 0 0.73
                0.1 0.1 0.05 0 0.55
                0 0 0 0 1" in="noise" result="parchmentColor"/>
      <feBlend in="SourceGraphic" in2="parchmentColor" mode="multiply"/>
    </filter>

    <!-- Foxing marks: age spots filter -->
    <filter id="foxingFilter">
      <feTurbulence type="turbulence" baseFrequency="0.08 0.08" numOctaves="2" seed="42" result="foxNoise"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.4
                0 0 0 0 0.2
                0 0 0 0 0.05
                0 0 0 8 -6" in="foxNoise" result="foxMask"/>
      <feComposite in="foxMask" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Gold gradient for wheel icon -->
    <radialGradient id="goldGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#DFC07E"/>
      <stop offset="60%" stop-color="#C8A96E"/>
      <stop offset="100%" stop-color="#A07840"/>
    </radialGradient>

    <!-- Parchment base gradient (warm off-white with slight toning) -->
    <linearGradient id="parchBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5EDD4"/>
      <stop offset="40%" stop-color="#F2E8CE"/>
      <stop offset="100%" stop-color="#E8D9B0"/>
    </linearGradient>

    <!-- Deckled shadow (right + bottom edges) -->
    <linearGradient id="rightShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="80%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0D0A06" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="bottomShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="80%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0D0A06" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Ghost wax seal watermark (lower-right) -->
    <radialGradient id="sealGhost" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6B1A1A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6B1A1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Quill diagonal gradient -->
    <linearGradient id="quillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8A96E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8A96E" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- ── Background: aged parchment ── -->
  <rect width="460" height="215" fill="url(#parchBg)"/>
  <!-- Parchment texture overlay -->
  <rect width="460" height="215" fill="url(#parchBg)" filter="url(#parchmentFilter)" opacity="0.4"/>

  <!-- Foxing marks (age spots) scattered -->
  <g fill="#8B6040" opacity="0.12" filter="url(#foxingFilter)">
    <circle cx="45" cy="30" r="4"/>
    <circle cx="380" cy="20" r="3"/>
    <circle cx="420" cy="80" r="5"/>
    <circle cx="30" cy="140" r="3"/>
    <circle cx="350" cy="170" r="4"/>
    <circle cx="90" cy="195" r="3"/>
    <circle cx="210" cy="15" r="3"/>
    <circle cx="440" cy="150" r="4"/>
    <circle cx="155" cy="185" r="3"/>
    <circle cx="290" cy="200" r="3"/>
  </g>

  <!-- Ghost wax seal watermark (lower-right corner, ~15% opacity) -->
  <circle cx="390" cy="175" r="55" fill="none" stroke="#6B1A1A" stroke-width="8" opacity="0.08"/>
  <circle cx="390" cy="175" r="30" fill="url(#sealGhost)"/>
  <!-- Ghost mill wheel spokes -->
  <g stroke="#6B1A1A" stroke-width="1.5" opacity="0.07">
    <line x1="390" y1="150" x2="390" y2="200"/>
    <line x1="365" y1="175" x2="415" y2="175"/>
    <line x1="373" y1="158" x2="407" y2="192"/>
    <line x1="407" y1="158" x2="373" y2="192"/>
  </g>

  <!-- ── Quill motif behind wordmark (30° diagonal, background layer) ── -->
  <!-- Quill shaft -->
  <line x1="100" y1="160" x2="360" y2="55"
        stroke="url(#quillGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Quill feather barbs (left side) -->
  <g stroke="#C8A96E" stroke-opacity="0.2" stroke-width="1.2" fill="none">
    <path d="M 340,65 Q 330,70 320,65"/>
    <path d="M 320,75 Q 308,82 296,76"/>
    <path d="M 300,85 Q 286,93 272,87"/>
    <path d="M 278,97 Q 262,106 246,100"/>
    <path d="M 254,109 Q 237,118 220,112"/>
    <path d="M 228,122 Q 210,132 192,126"/>
    <path d="M 200,136 Q 181,147 162,141"/>
    <path d="M 170,151 Q 150,162 130,156"/>
  </g>
  <!-- Quill feather barbs (right side) -->
  <g stroke="#C8A96E" stroke-opacity="0.2" stroke-width="1.2" fill="none">
    <path d="M 340,65 Q 350,58 358,62"/>
    <path d="M 320,75 Q 332,67 342,70"/>
    <path d="M 300,85 Q 313,76 324,79"/>
    <path d="M 278,97 Q 292,87 303,91"/>
    <path d="M 254,109 Q 270,98 281,103"/>
    <path d="M 228,122 Q 246,110 257,116"/>
    <path d="M 200,136 Q 218,123 230,130"/>
    <path d="M 170,151 Q 190,136 202,144"/>
  </g>
  <!-- Quill nib + whisper tail -->
  <path d="M 108,156 L 102,164 Q 96,180 88,185 Q 95,172 100,162 Z"
        fill="#C8A96E" fill-opacity="0.25"/>

  <!-- ── Logo plate (slightly irregular parchment rect) ── -->
  <!-- Deckled plate: approximately 280px wide, centered -->
  <rect x="90" y="45" width="280" height="125" rx="3" ry="3"
        fill="#F8F0DC" fill-opacity="0.85" stroke="#D4C49A" stroke-width="0.5"/>
  <!-- Subtle inner shadow on plate -->
  <rect x="90" y="45" width="280" height="125" rx="3" ry="3"
        fill="none" stroke="#C8A96E" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- ── RUMOR MILL Wordmark ── -->
  <!-- "RUMOR" line (condensed, tall blackletter-inspired serif) -->
  <text x="230" y="115"
        font-family="Georgia, 'Palatino Linotype', 'Times New Roman', serif"
        font-size="52"
        font-weight="bold"
        letter-spacing="8"
        text-anchor="middle"
        fill="#1A1208">RUMOR</text>
  <!-- "MILL" line (bolder, wider weight — anchor) -->
  <text x="230" y="155"
        font-family="Georgia, 'Palatino Linotype', 'Times New Roman', serif"
        font-size="46"
        font-weight="bold"
        letter-spacing="14"
        text-anchor="middle"
        fill="#1A1208">MILL</text>

  <!-- Tagline below wordmark -->
  <text x="230" y="185"
        font-family="Georgia, 'Palatino Linotype', 'Times New Roman', serif"
        font-size="13"
        letter-spacing="2"
        text-anchor="middle"
        fill="#4A4035">A medieval gossip simulation</text>

  <!-- ── Partial mill wheel icon, lower-left corner (partially clipped) ── -->
  <!-- Positioned so it's ~50% clipped by left/bottom edges -->
  <g transform="translate(-10, 167)">
    <!-- Wheel circle partial (will be clipped by canvas) -->
    <circle cx="32" cy="48" r="44" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5"/>
    <!-- Spokes in gold -->
    <g stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" opacity="0.85">
      <line x1="32" y1="10" x2="32" y2="86"/>
      <line x1="-4" y1="48" x2="68" y2="48"/>
      <line x1="6" y1="22" x2="58" y2="74"/>
      <line x1="58" y1="22" x2="6" y2="74"/>
    </g>
    <!-- Hub -->
    <circle cx="32" cy="48" r="9" fill="url(#goldGrad)"/>
    <circle cx="32" cy="48" r="5" fill="#1A1208"/>
    <!-- Eye slit -->
    <ellipse cx="32" cy="48" rx="1.5" ry="4" fill="#C8A96E" opacity="0.7"/>
  </g>

  <!-- ── Deckled shadows (right + bottom edges suggesting parchment lying on surface) ── -->
  <rect width="460" height="215" fill="url(#rightShadow)"/>
  <rect width="460" height="215" fill="url(#bottomShadow)"/>

  <!-- Subtle top highlight (parchment curl light) -->
  <rect x="0" y="0" width="460" height="4"
        fill="#FFFAEE" fill-opacity="0.5" rx="2"/>
</svg>
