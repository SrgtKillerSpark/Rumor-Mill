<svg xmlns="http://www.w3.org/2000/svg" width="630" height="500" viewBox="0 0 630 500">
  <defs>
    <!-- Sky gradient: burnt amber at horizon, near-black indigo at top -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0718"/>
      <stop offset="55%" stop-color="#1A0C04"/>
      <stop offset="100%" stop-color="#3D1C02"/>
    </linearGradient>

    <!-- Ground / town gradient -->
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C0E02"/>
      <stop offset="100%" stop-color="#0D0A06"/>
    </linearGradient>

    <!-- Lantern warm glow radial -->
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#E8821A" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#FF7A1A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Lantern inner bright point -->
    <radialGradient id="lanternCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF0C0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FF9A30" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Fog at ground level -->
    <linearGradient id="fogGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Cloak shadow on figures -->
    <linearGradient id="cloakGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2018"/>
      <stop offset="100%" stop-color="#0D0A06"/>
    </linearGradient>

    <!-- Lantern edge light on cloaks -->
    <linearGradient id="cloakLightLeft" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cloakLightRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7A1A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
    </linearGradient>

    <!-- Gold grad for logo -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8A96E"/>
      <stop offset="50%" stop-color="#DFC07E"/>
      <stop offset="100%" stop-color="#C8A96E"/>
    </linearGradient>
  </defs>

  <!-- ── Sky (upper 40%) ── -->
  <rect width="630" height="500" fill="url(#skyGrad)"/>

  <!-- Stars: faint pinpoints -->
  <g fill="#F2E8CE" opacity="0.5">
    <circle cx="48" cy="22" r="0.8"/>
    <circle cx="102" cy="14" r="0.6"/>
    <circle cx="165" cy="30" r="0.9"/>
    <circle cx="240" cy="10" r="0.6"/>
    <circle cx="310" cy="28" r="0.7"/>
    <circle cx="385" cy="18" r="0.8"/>
    <circle cx="445" cy="38" r="0.5"/>
    <circle cx="510" cy="12" r="0.7"/>
    <circle cx="570" cy="25" r="0.9"/>
    <circle cx="610" cy="45" r="0.5"/>
    <circle cx="78" cy="55" r="0.5"/>
    <circle cx="200" cy="48" r="0.6"/>
    <circle cx="350" cy="55" r="0.6"/>
    <circle cx="480" cy="50" r="0.5"/>
    <circle cx="20" cy="75" r="0.5"/>
    <circle cx="130" cy="65" r="0.7"/>
    <circle cx="275" cy="72" r="0.5"/>
    <circle cx="415" cy="60" r="0.6"/>
    <circle cx="545" cy="68" r="0.8"/>
  </g>

  <!-- ── Town ground (lower 60%) ── -->
  <rect x="0" y="200" width="630" height="300" fill="url(#groundGrad)"/>

  <!-- ── Background: city wall silhouette ── -->
  <g fill="#0D0A06" opacity="0.9">
    <!-- Left hills -->
    <ellipse cx="-30" cy="210" rx="120" ry="40" fill="#0E0B07"/>
    <ellipse cx="80" cy="205" rx="100" ry="35" fill="#0E0B07"/>
    <!-- City wall crenellations -->
    <rect x="-10" y="185" width="120" height="30" fill="#130E09"/>
    <rect x="-10" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="10" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="30" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="50" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="70" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="90" y="175" width="12" height="12" fill="#130E09"/>
    <!-- Right hills -->
    <ellipse cx="660" cy="210" rx="120" ry="40" fill="#0E0B07"/>
    <ellipse cx="555" cy="205" rx="100" ry="35" fill="#0E0B07"/>
    <!-- Right city wall -->
    <rect x="520" y="185" width="120" height="30" fill="#130E09"/>
    <rect x="528" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="548" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="568" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="588" y="175" width="12" height="12" fill="#130E09"/>
    <rect x="608" y="175" width="12" height="12" fill="#130E09"/>
  </g>

  <!-- ── Mid-ground: Tavern (left) ── -->
  <g fill="#1A1008">
    <!-- Tavern body -->
    <rect x="30" y="200" width="140" height="160"/>
    <!-- Tavern roof (peaked) -->
    <polygon points="15,200 85,155 185,200" fill="#160D05"/>
    <!-- Tavern sign beam -->
    <rect x="148" y="200" width="4" height="30" fill="#2A1A08"/>
    <rect x="148" y="200" width="24" height="16" fill="#2A1A08" rx="2"/>
    <!-- Shuttered windows with warm candlelight bleeding through -->
    <!-- Window 1 -->
    <rect x="50" y="215" width="28" height="22" fill="#0D0A06"/>
    <rect x="52" y="217" width="24" height="18" fill="#3A1E04"/>
    <line x1="64" y1="217" x2="64" y2="235" stroke="#1A0D02" stroke-width="2"/>
    <rect x="52" y="217" width="24" height="18" fill="#FF9030" fill-opacity="0.12"/>
    <!-- Window 2 -->
    <rect x="100" y="215" width="28" height="22" fill="#0D0A06"/>
    <rect x="102" y="217" width="24" height="18" fill="#3A1E04"/>
    <line x1="114" y1="217" x2="114" y2="235" stroke="#1A0D02" stroke-width="2"/>
    <rect x="102" y="217" width="24" height="18" fill="#FF9030" fill-opacity="0.15"/>
    <!-- Window 3 (upstairs) -->
    <rect x="75" y="165" width="24" height="18" fill="#0D0A06"/>
    <rect x="77" y="167" width="20" height="14" fill="#3A1E04"/>
    <rect x="77" y="167" width="20" height="14" fill="#FF9030" fill-opacity="0.10"/>
    <!-- Tavern door -->
    <rect x="78" y="310" width="24" height="50" fill="#1C1008" rx="2" ry="2"/>
    <rect x="80" y="312" width="20" height="46" fill="#140C05" rx="1"/>
  </g>

  <!-- ── Mid-ground: Watermill (right of center) ── -->
  <g fill="#1C1208">
    <!-- Mill building -->
    <rect x="420" y="210" width="100" height="150"/>
    <!-- Mill roof -->
    <polygon points="405,210 470,165 535,210" fill="#160D05"/>
    <!-- Mill window -->
    <rect x="445" y="225" width="22" height="20" fill="#0D0A06"/>
    <rect x="447" y="227" width="18" height="16" fill="#2A1604" rx="1"/>
    <!-- Mill wheel hub/axle -->
    <circle cx="415" cy="270" r="6" fill="#2A1A08"/>
    <!-- Mill wheel - large, partially visible, one blade catching light -->
    <!-- Wheel rim -->
    <circle cx="415" cy="270" r="72" fill="none" stroke="#2A1A08" stroke-width="8"/>
    <!-- Wheel spokes -->
    <g stroke="#2A1A08" stroke-width="6" fill="none">
      <line x1="415" y1="198" x2="415" y2="342"/>
      <line x1="343" y1="270" x2="487" y2="270"/>
      <line x1="364" y1="219" x2="466" y2="321"/>
      <line x1="466" y1="219" x2="364" y2="321"/>
    </g>
    <!-- One blade catching amber lantern light -->
    <path d="M 415,198 L 407,202 L 407,240 L 423,240 L 423,202 Z" fill="#FF9030" fill-opacity="0.25"/>
    <!-- Mill blade paddles -->
    <g fill="#1C1208" stroke="#2A1A08" stroke-width="1">
      <rect x="408" y="196" width="14" height="18" rx="1"/>
      <rect x="487" y="263" width="18" height="14" rx="1" transform="rotate(0, 496, 270)"/>
      <rect x="408" y="326" width="14" height="18" rx="1"/>
      <rect x="340" y="263" width="18" height="14" rx="1"/>
    </g>
  </g>

  <!-- ── Mid-ground: Stone well (center) ── -->
  <g fill="#1A1208">
    <ellipse cx="315" cy="335" rx="22" ry="10" fill="#221A10"/>
    <rect x="293" y="305" width="44" height="32" fill="#1A1208"/>
    <rect x="293" y="295" width="44" height="12" fill="#221A10" rx="2"/>
    <!-- Well roof posts -->
    <rect x="294" y="258" width="4" height="40" fill="#261E0E"/>
    <rect x="334" y="258" width="4" height="40" fill="#261E0E"/>
    <!-- Well roof -->
    <polygon points="288,258 315,242 344,258" fill="#1C1408"/>
    <!-- NPC leaning against well (listening, back turned) -->
    <!-- Body -->
    <rect x="335" y="285" width="16" height="35" fill="#1C1410" rx="3"/>
    <!-- Head -->
    <circle cx="343" cy="280" r="9" fill="#1C1410"/>
    <!-- Cloak hem -->
    <ellipse cx="343" cy="320" rx="10" ry="4" fill="#161008"/>
  </g>

  <!-- ── Market stalls (background, closed) ── -->
  <g fill="#1A1208" opacity="0.8">
    <!-- Left stall -->
    <rect x="155" y="230" width="60" height="55"/>
    <polygon points="148,230 185,215 228,230" fill="#160D05"/>
    <!-- Canvas awning frayed edge -->
    <path d="M 148,230 L 155,228 L 162,232 L 169,228 L 176,232 L 183,228 L 190,232 L 197,228 L 204,232 L 211,228 L 218,232 L 225,228 L 228,230"
          fill="none" stroke="#2A1A08" stroke-width="1.5"/>
    <!-- Right stall -->
    <rect x="540" y="238" width="60" height="50"/>
    <polygon points="533,238 570,223 613,238" fill="#160D05"/>
    <path d="M 533,238 L 540,236 L 547,240 L 554,236 L 561,240 L 568,236 L 575,240 L 582,236 L 589,240 L 596,236 L 603,240 L 608,238"
          fill="none" stroke="#2A1A08" stroke-width="1.5"/>
  </g>

  <!-- ── Cobblestone path (foreground) ── -->
  <g fill="none" stroke="#1C1510" stroke-width="1" opacity="0.4">
    <!-- Cobblestone grid suggestions -->
    <ellipse cx="150" cy="430" rx="18" ry="10"/>
    <ellipse cx="200" cy="445" rx="16" ry="9"/>
    <ellipse cx="260" cy="435" rx="20" ry="11"/>
    <ellipse cx="320" cy="450" rx="17" ry="9"/>
    <ellipse cx="380" cy="438" rx="18" ry="10"/>
    <ellipse cx="440" cy="448" rx="15" ry="8"/>
    <ellipse cx="500" cy="440" rx="17" ry="9"/>
    <ellipse cx="120" cy="460" rx="14" ry="8"/>
    <ellipse cx="170" cy="470" rx="16" ry="9"/>
    <ellipse cx="230" cy="465" rx="18" ry="10"/>
    <ellipse cx="290" cy="472" rx="15" ry="8"/>
    <ellipse cx="360" cy="468" rx="17" ry="9"/>
    <ellipse cx="420" cy="475" rx="14" ry="7"/>
    <ellipse cx="490" cy="470" rx="16" ry="8"/>
    <ellipse cx="565" cy="460" rx="15" ry="8"/>
  </g>

  <!-- ── Lantern glow (centered, brightest element) ── -->
  <!-- Wide ambient glow -->
  <ellipse cx="315" cy="360" rx="160" ry="130" fill="url(#lanternGlow)"/>
  <!-- Tighter warm pool -->
  <ellipse cx="315" cy="355" rx="80" ry="65" fill="#FF7A1A" fill-opacity="0.15"/>

  <!-- ── Lantern post ── -->
  <!-- Post -->
  <rect x="312" y="290" width="6" height="110" fill="#2A1A08"/>
  <rect x="310" y="390" width="10" height="8" fill="#2A1A08" rx="1"/>
  <!-- Lantern housing -->
  <rect x="303" y="275" width="24" height="20" fill="#3A2810" rx="2"/>
  <!-- Lantern glass (warm glow) -->
  <rect x="305" y="277" width="20" height="16" fill="#FF9030" fill-opacity="0.75" rx="1"/>
  <!-- Lantern bright core -->
  <ellipse cx="315" cy="285" rx="7" ry="6" fill="url(#lanternCore)"/>
  <!-- Lantern cap -->
  <polygon points="300,275 315,265 330,275" fill="#2A1A08"/>

  <!-- ── Two cloaked figures (foreground center-lower) ── -->
  <!-- Figure LEFT: leaning right, hand gesturing toward other's ear -->
  <g transform="translate(248, 360)">
    <!-- Cloak body -->
    <path d="M 0,0 L -22,100 L 22,100 L 18,0 Z" fill="url(#cloakGrad)" rx="4"/>
    <!-- Cloak left edge lantern light -->
    <path d="M 18,0 L 22,100 L 14,100 L 10,0 Z" fill="url(#cloakLightLeft)" opacity="0.6"/>
    <!-- Shoulders / hood -->
    <ellipse cx="9" cy="-5" rx="18" ry="10" fill="#1C1410"/>
    <!-- Hood / head (in deep shadow) -->
    <ellipse cx="9" cy="-20" rx="13" ry="15" fill="#161008"/>
    <!-- Raised hand/arm gesture -->
    <path d="M 22,15 Q 42,5 50,-10" fill="none" stroke="#1C1410" stroke-width="9" stroke-linecap="round"/>
    <!-- Finger pointing -->
    <circle cx="50" cy="-10" r="4" fill="#1C1410"/>
    <!-- Cloak hem fringe -->
    <path d="M -22,100 Q -16,105 -10,100 Q -4,105 2,100 Q 8,105 14,100 Q 18,105 22,100"
          fill="none" stroke="#1C1410" stroke-width="2"/>
  </g>

  <!-- Figure RIGHT: leaning left, hand near ear -->
  <g transform="translate(356, 355)">
    <!-- Cloak body -->
    <path d="M 0,0 L -22,105 L 22,105 L 18,0 Z" fill="url(#cloakGrad)"/>
    <!-- Cloak right edge lantern light -->
    <path d="M -22,0 L -18,105 L -10,105 L -6,0 Z" fill="url(#cloakLightRight)" opacity="0.5"/>
    <!-- Shoulders / hood -->
    <ellipse cx="0" cy="-5" rx="18" ry="10" fill="#1C1410"/>
    <!-- Hood / head -->
    <ellipse cx="-2" cy="-20" rx="13" ry="15" fill="#161008"/>
    <!-- Hand raised to ear -->
    <path d="M -18,15 Q -36,8 -42,-5" fill="none" stroke="#1C1410" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-42" cy="-5" r="4" fill="#1C1410"/>
    <!-- Cloak hem fringe -->
    <path d="M -22,105 Q -16,110 -10,105 Q -4,110 2,105 Q 8,110 14,105 Q 18,110 22,105"
          fill="none" stroke="#1C1410" stroke-width="2"/>
  </g>

  <!-- ── Ground fog (low-opacity white drifting in from sides) ── -->
  <rect x="0" y="440" width="630" height="60" fill="url(#fogGrad)"/>
  <!-- Fog wisps -->
  <ellipse cx="100" cy="470" rx="150" ry="25" fill="#FFFFFF" fill-opacity="0.04"/>
  <ellipse cx="500" cy="475" rx="180" ry="20" fill="#FFFFFF" fill-opacity="0.04"/>
  <ellipse cx="315" cy="465" rx="200" ry="18" fill="#FFFFFF" fill-opacity="0.03"/>

  <!-- ── Logo: RUMOR MILL wordmark (upper center) ── -->
  <!-- Logo plate (parchment panel) -->
  <rect x="205" y="18" width="220" height="72" rx="3" ry="3"
        fill="#F2E8CE" fill-opacity="0.92"/>
  <rect x="205" y="18" width="220" height="72" rx="3" ry="3"
        fill="none" stroke="#C8A96E" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Quill behind text (light) -->
  <line x1="215" y1="80" x2="415" y2="25"
        stroke="#C8A96E" stroke-opacity="0.25" stroke-width="2"/>
  <!-- RUMOR -->
  <text x="315" y="53"
        font-family="Georgia, 'Palatino Linotype', 'Times New Roman', serif"
        font-size="28" font-weight="bold" letter-spacing="5"
        text-anchor="middle" fill="#1A1208">RUMOR</text>
  <!-- MILL -->
  <text x="315" y="79"
        font-family="Georgia, 'Palatino Linotype', 'Times New Roman', serif"
        font-size="25" font-weight="bold" letter-spacing="10"
        text-anchor="middle" fill="#1A1208">MILL</text>

  <!-- Tagline below logo plate -->
  <text x="315" y="106"
        font-family="Georgia, 'Palatino Linotype', 'Times New Roman', serif"
        font-size="13" letter-spacing="1.5"
        text-anchor="middle" fill="#D4C49A">"No swords. Just whispers."</text>
</svg>
