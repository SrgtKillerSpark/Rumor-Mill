name: Validate GDScript

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "rumor_mill/scripts/**"
      - "rumor_mill/scenes/**"
      - "rumor_mill/tools/**"
      - "rumor_mill/project.godot"
      - ".github/workflows/validate-gdscript.yml"
  pull_request:
    paths:
      - "rumor_mill/scripts/**"
      - "rumor_mill/scenes/**"
      - "rumor_mill/tools/**"
      - "rumor_mill/project.godot"
      - ".github/workflows/validate-gdscript.yml"
  workflow_dispatch:

jobs:
  validate:
    name: GDScript parse & type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot 4 (headless)
        run: |
          GODOT_VERSION="4.6"
          GODOT_RELEASE="stable"
          FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          URL="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${FILENAME}.zip"
          echo "Downloading Godot $GODOT_VERSION $GODOT_RELEASE..."
          curl -fsSL "$URL" -o godot.zip
          unzip -q godot.zip -d godot_bin
          chmod +x "godot_bin/${FILENAME}"
          echo "$PWD/godot_bin" >> "$GITHUB_PATH"
          echo "GODOT_BIN=$PWD/godot_bin/${FILENAME}" >> "$GITHUB_ENV"

      - name: Import project assets (first-run cache build)
        run: |
          # First headless run builds the .godot/ import cache; errors here are expected
          "$GODOT_BIN" --headless --path rumor_mill --import --quit || true

      - name: Run GDScript validation
        run: |
          bash rumor_mill/tools/validate_gdscript.sh \
            --godot "$GODOT_BIN" \
            --project rumor_mill

      - name: Smoke-launch main scene (headless boot)
        run: |
          # Boot the game headless and verify it reaches _ready without parse/autoload crash.
          # The --quit flag tells the engine to exit after the first idle frame.
          # We capture stderr for error detection while allowing a clean exit.
          SMOKE_LOG="$(mktemp /tmp/smoke_launch_XXXXXX.log)"
          set +e
          timeout 45 "$GODOT_BIN" --headless --path rumor_mill --quit 2>"$SMOKE_LOG" 1>/dev/null
          SMOKE_EXIT=$?
          set -e
          # timeout returns 124 on kill — acceptable (means engine loaded and ran)
          if [[ $SMOKE_EXIT -ne 0 && $SMOKE_EXIT -ne 124 ]]; then
            echo "✗ Smoke-launch FAILED — Godot exited with code $SMOKE_EXIT"
            cat "$SMOKE_LOG"
            exit 1
          fi
          # Check for fatal errors (parse errors, autoload crashes).
          # Exclude GDExtension load failures (missing godotsteam .dll in CI) —
          # they match ERROR:.*res:// but are not GDScript or boot errors.
          FATAL=$(grep -E "^(ERROR|SCRIPT ERROR).*res://|^Parse error:|FATAL" "$SMOKE_LOG" \
            | grep -v "GDExtension\|Error loading extension" || true)
          if [[ -n "$FATAL" ]]; then
            echo "✗ Smoke-launch detected fatal errors during boot:"
            echo "$FATAL"
            exit 1
          fi
          echo "✓ Smoke-launch passed — main scene booted without parse/autoload errors."
          rm -f "$SMOKE_LOG"
